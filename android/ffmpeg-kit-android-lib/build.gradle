mavenPublishing {
    publishToMavenCentral(SonatypeHost.CENTRAL_PORTAL)
    signAllPublications()
    coordinates("io.github.maitrungduc1410", "ffmpeg-kit-${ffmpegKitPackage}", ffmpegKitVersion)

    pom {
        name = "FFmpegKit Android Library (${ffmpegKitPackage.toUpperCase()})"
        description = "FFmpegKit is a complete, cross-platform solution to record, convert and stream audio and video. It is based on FFmpeg, the leading multimedia framework."
        inceptionYear = "2025"
        url = "https://github.com/maitrungduc1410/ffmpeg-kit"
        licenses {
            license {
                // The published bundle contains FFmpeg (built with --enable-version3 and
                // without --enable-gpl) plus the FFmpegKit wrapper, both of which are
                // LGPL v3.0, so the artifact as a whole is distributed under LGPL v3.0.
                name = "GNU Lesser General Public License v3.0"
                url = "https://www.gnu.org/licenses/lgpl-3.0.en.html"
                distribution = "repo"
            }
        }
        developers {
            developer {
                id = 'maitrungduc1410'
                name = 'Mai Trung Duc'
                url = "https://github.com/maitrungduc1410/"
            }
        }
        scm {
            connection = 'scm:git:git://git@github.com:maitrungduc1410/ffmpeg-kit.git'
            developerConnection = 'scm:git:ssh://git@github.com:maitrungduc1410/ffmpeg-kit.git'
            url = 'https://github.com/maitrungduc1410/ffmpeg-kit'
        }
    }
}

dependencies {
    api 'com.arthenica:smart-exception-java:0.2.1'
    testImplementation "androidx.test.ext:junit:1.1.5"
    testImplementation 'org.json:json:20230618'
}