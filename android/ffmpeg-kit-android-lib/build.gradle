plugins {
    id 'com.android.library'
    id "com.vanniktech.maven.publish" version "0.32.0" apply true
}

import com.vanniktech.maven.publish.SonatypeHost

// Which package (min/https/audio/video/full) and version are being published.
// Passed from CI as -PffmpegKitPackage=<variant> -PffmpegKitVersion=<x.y.z>.
// Defaults keep local/manual `assembleRelease` working without extra flags.
def ffmpegKitPackage = (project.findProperty("ffmpegKitPackage") ?: "https").toString()
def ffmpegKitVersion = (project.findProperty("ffmpegKitVersion") ?: "7.1.5").toString()

android {
    if (project.android.hasProperty("namespace")) {
        namespace 'com.arthenica.ffmpegkit'
    }
    compileSdk 33
    // No ndkVersion here on purpose: this module is published from prebuilt .so files
    // in ../libs (jniLibs), it does not compile native code, so it must not require an
    // NDK to be installed on the publishing runner. The native build uses
    // tools/android/build.gradle instead (android.sh swaps this file out at build time).

    defaultConfig {
        minSdk 24
        targetSdk 33
        versionCode 240600
        versionName ffmpegKitVersion
        project.archivesBaseName = "ffmpeg-kit"
        consumerProguardFiles "consumer-rules.pro"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    sourceSets {
        main {
            jniLibs.srcDirs = ["../libs"]
        }
    }

    testOptions {
        unitTests.returnDefaultValues = true
        unitTests.all {
            systemProperty 'enable.ffmpeg.kit.test.mode', 'true'
        }
    }


//    publishing {
//        singleVariant('release') {
//            withJavadocJar()
//            withSourcesJar()
//        }
//    }
}

